<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AWS Smart Placement Prediction Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-cloud-fill"></i>
                AWS Smart Placement Prediction Portal
            </span>
        </div>
    </nav>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="card shadow-lg">

                    <div class="card-body p-5">

                        <h2 class="text-center mb-2">
                            Placement Prediction
                        </h2>

                        <p class="text-center text-muted mb-4">
                            Predict your placement chances using Machine Learning powered by AWS Cloud Services.
                        </p>

                        <form action="/predict" method="POST" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label class="form-label">Student Name</label>
                                <input type="text" class="form-control" name="name" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">CGPA</label>
                                <input type="number" class="form-control" step="0.1" name="cgpa" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">DSA Score</label>
                                <input type="number" class="form-control" name="dsa" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Projects Completed</label>
                                <input type="number" class="form-control" name="projects" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Internship</label>

                                <select class="form-select" name="internship">

                                    <option value="1">Yes</option>

                                    <option value="0">No</option>

                                </select>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Communication Skills (1-10)</label>
                                <input type="number" class="form-control" name="communication" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Upload Resume (PDF)</label>
                                <input type="file" class="form-control" name="resume" accept=".pdf">
                            </div>

                            <button class="btn btn-primary w-100" id="predictBtn">
                                <i class="bi bi-bar-chart-fill"></i>
                                Predict Placement
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <footer>

        Developed using Flask | Machine Learning | AWS

    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
